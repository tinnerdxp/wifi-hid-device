; PlatformIO configuration for ESP32-S2 Mini WiFi HID Device
; ───────────────────────────────────────────────────────────
; Board:    LOLIN S2 Mini (ESP32-S2 with TinyUSB)
; Platform: espressif32
;
; Build with:  pio run
; Upload with: pio run --target upload
; Monitor:     pio device monitor   (USB-CDC must be enabled for serial output)
;
; NOTE: After flashing, disconnect and reconnect USB so the host re-enumerates
;       the device as a HID keyboard + mouse.
;
; All user-configurable values (WiFi credentials, LED pin, USB strings, etc.)
; live in wifi_hid_device/config.h — no changes needed here for typical use.
;
; Built-in libraries used (no extra installation required):
;   DNSServer  — captive portal during WiFi provisioning
;   Preferences — persistent NVS storage for WiFi credentials
;   WiFi, WebServer — part of the ESP32 Arduino core

[env:lolin_s2_mini]
platform  = espressif32
board     = lolin_s2_mini
framework = arduino

; Enable native USB (TinyUSB) for HID; disable USB-CDC to free the USB stack
; for HID-only operation.
; USB_MANUFACTURER and USB_PRODUCT are defined in config.h and picked up
; by the TinyUSB descriptor at compile time.
build_flags =
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0

lib_deps =
    ; WebSocket server (by Markus Sattler / Links2004)
    links2004/WebSockets @ ^2.4.0
    ; JSON serialisation / deserialisation
    bblanchon/ArduinoJson @ ^6.21.0

monitor_speed = 115200
